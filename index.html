<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 帝國指揮所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#e8c050;--gold2:#c8963e;--gold3:#a07828;
}
html,body{min-height:100vh;font-family:'Noto Serif TC',serif;overflow-x:hidden;background:#0e0c08;}

.bg{
  position:fixed;inset:0;z-index:0;
  background-image:url('bg-inkwash.jpg');
  background-size:cover;
  background-position:center top;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(14,12,8,0.05) 0%,
    rgba(14,12,8,0.20) 35%,
    rgba(14,12,8,0.60) 62%,
    rgba(14,12,8,0.88) 82%,
    rgba(14,12,8,0.97) 100%
  );
}
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.045;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
}

.wrap{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 60px;
}

/* ── Header ── */
.header{
  width:100%;max-width:1100px;
  padding:32px 0 28px;
  display:flex;align-items:center;justify-content:center;
  gap:24px;
  position:relative;
}
.header::before,.header::after{
  content:'';position:absolute;top:50%;
  height:1px;width:18%;
  background:linear-gradient(90deg,transparent,rgba(200,150,40,0.35),transparent);
}
.header::before{left:0}.header::after{right:0}

/* 主公圖 — 緊靠標題左側 */
.hdr-char{
  width:110px;height:110px;flex-shrink:0;
  object-fit:contain;object-position:center bottom;
  filter:drop-shadow(0 0 22px rgba(200,150,62,.7)) drop-shadow(0 0 8px rgba(232,192,80,.4));
  cursor:pointer;
  transition:filter .3s, transform .3s;
}
.hdr-char:hover{
  filter:drop-shadow(0 0 32px rgba(232,192,80,.9)) drop-shadow(0 0 12px rgba(200,150,62,.6));
  transform:scale(1.08) translateY(-4px);
}

.header-inner{
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.hdr-title{
  font-size:28px;font-weight:900;letter-spacing:10px;
  color:#fff8e8;
  text-shadow:
    0 0 2px rgba(0,0,0,1),0 0 8px rgba(0,0,0,1),0 2px 6px rgba(0,0,0,1),
    -1px -1px 0 rgba(0,0,0,.8),1px -1px 0 rgba(0,0,0,.8),
    0 0 30px rgba(220,170,50,.7),0 0 60px rgba(220,170,50,.3);
}
.hdr-sub{
  font-family:'Cinzel Decorative',serif;
  font-size:9px;letter-spacing:7px;color:#d4b070;
  text-shadow:0 0 4px rgba(0,0,0,1),0 1px 5px rgba(0,0,0,1);
  text-transform:uppercase;
}
.hdr-date{display:flex;align-items:baseline;gap:10px;margin-top:2px;}
.hdr-date-day{
  font-family:'Cinzel Decorative',serif;
  font-size:32px;font-weight:700;color:#f0dfa0;line-height:1;
  text-shadow:0 0 10px rgba(0,0,0,.98),0 2px 5px rgba(0,0,0,.95),0 0 24px rgba(200,150,40,.4);
}
.hdr-date-ym{font-size:12px;color:#d8c090;letter-spacing:2px;text-shadow:0 0 4px rgba(0,0,0,1),0 1px 5px rgba(0,0,0,1);font-family:'Noto Sans TC',sans-serif;font-weight:600;}
.hdr-date-week{font-size:11px;color:#c0a870;letter-spacing:1px;text-shadow:0 0 4px rgba(0,0,0,1),0 1px 5px rgba(0,0,0,1);font-family:'Noto Sans TC',sans-serif;font-weight:600;}

/* ── 卡片區 ── */
.cards{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:12px;width:100%;max-width:1100px;}
.card{width:240px;cursor:pointer;position:relative;animation:appear .7s cubic-bezier(.22,1,.36,1) both;transition:transform .35s cubic-bezier(.25,.46,.45,.94);}
.card:nth-child(1){animation-delay:.1s}
.card:nth-child(2){animation-delay:.25s}
.card:nth-child(3){animation-delay:.4s}
.card:nth-child(4){animation-delay:.55s}
@keyframes appear{from{opacity:0;transform:translateY(36px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.card:hover{transform:translateY(-12px) scale(1.03);z-index:10}
.frame{
  border-radius:8px;overflow:hidden;
  border:1px solid rgba(200,150,40,0.38);
  box-shadow:0 0 0 1px rgba(200,150,40,0.12),0 8px 40px rgba(0,0,0,0.75),0 2px 8px rgba(0,0,0,0.6),inset 0 0 20px rgba(200,150,40,0.04);
  background:#0e0c08;position:relative;
}
.corner{position:absolute;width:14px;height:14px;z-index:5;pointer-events:none}
.corner.tl{top:5px;left:5px;border-top:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.corner.tr{top:5px;right:5px;border-top:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}
.corner.bl{bottom:5px;left:5px;border-bottom:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.corner.br{bottom:5px;right:5px;border-bottom:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}
.card-video-wrap{position:relative;overflow:hidden;height:427px;}
.card-video-wrap video{width:100%;height:auto;display:block;}
.card-label{
  position:absolute;bottom:0;left:0;right:0;z-index:4;
  background:linear-gradient(to top,rgba(8,5,3,.95) 0%,rgba(8,5,3,.5) 50%,transparent 100%);
  padding:18px 12px 12px;text-align:center;pointer-events:none;
}
.card-label span{font-family:'Noto Sans TC',sans-serif;font-size:11px;color:#c09a50;letter-spacing:3px;}

.footer-note{
  margin-top:36px;font-family:'Noto Sans TC',sans-serif;
  font-size:11px;color:rgba(180,150,80,0.45);letter-spacing:5px;text-align:center;
}

/* ══════════════════════════════════════
   主公面板 MODAL
══════════════════════════════════════ */
.lord-modal-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(5,3,1,.85);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
.lord-modal-overlay.open{display:flex;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.lord-modal{
  position:relative;width:min(560px,94vw);
  background:linear-gradient(160deg,#1c1608 0%,#120f07 60%,#0e0c08 100%);
  border:1px solid rgba(200,150,40,0.55);border-radius:12px;
  box-shadow:0 0 0 1px rgba(200,150,40,0.12),0 30px 80px rgba(0,0,0,.92),inset 0 0 40px rgba(200,150,40,0.03);
  padding:36px 32px 28px;
  animation:slideUp .35s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}

.mc{position:absolute;width:18px;height:18px}
.mc.tl{top:8px;left:8px;border-top:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.mc.tr{top:8px;right:8px;border-top:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}
.mc.bl{bottom:8px;left:8px;border-bottom:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.mc.br{bottom:8px;right:8px;border-bottom:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}

.lord-modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;color:rgba(200,150,40,0.5);font-size:20px;
  cursor:pointer;line-height:1;transition:color .2s,transform .2s;
  font-family:'Noto Sans TC',sans-serif;
}
.lord-modal-close:hover{color:var(--gold);transform:scale(1.15);}

/* Modal Header */
.lord-modal-hdr{
  display:flex;align-items:center;gap:18px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(200,150,40,0.2);
  margin-bottom:20px;
}
.lord-modal-avatar{
  width:72px;height:72px;flex-shrink:0;
  object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(200,150,60,.6));
}
.lord-modal-title-wrap{display:flex;flex-direction:column;gap:4px;}
.lord-modal-name{
  font-size:22px;font-weight:900;letter-spacing:6px;color:#f0e0a0;
  text-shadow:0 0 18px rgba(220,170,50,.5);
}
.lord-modal-sub{
  font-family:'Cinzel Decorative',serif;
  font-size:8.5px;letter-spacing:4px;color:#b08a40;text-transform:uppercase;
}

/* Loading state */
.lord-loading{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:32px 0;
  font-family:'Noto Sans TC',sans-serif;font-size:13px;
  color:rgba(200,160,60,.6);letter-spacing:3px;
}
.lord-spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(200,150,40,.2);
  border-top-color:var(--gold2);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 分隔線 */
.lord-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,150,40,0.3),transparent);
  margin:18px 0;
}

/* 財政區塊標題 */
.fin-section-title{
  font-family:'Noto Sans TC',sans-serif;
  font-size:9px;letter-spacing:4px;color:rgba(180,140,60,.55);
  text-transform:uppercase;margin-bottom:12px;
}

/* 本月摘要三欄 */
.fin-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.fin-card{
  background:rgba(200,150,40,0.04);
  border:1px solid rgba(200,150,40,0.14);
  border-radius:7px;padding:12px 10px;text-align:center;
}
.fin-card-label{
  font-family:'Noto Sans TC',sans-serif;
  font-size:9px;letter-spacing:2px;color:rgba(180,140,60,.55);margin-bottom:5px;
}
.fin-card-value{
  font-size:16px;font-weight:700;color:#e0c880;letter-spacing:1px;
  font-family:'Noto Sans TC',sans-serif;
}
.fin-card-value.income{color:#6ecf8a;}
.fin-card-value.expense{color:#e07060;}
.fin-card-value.net.positive{color:#6ecf8a;}
.fin-card-value.net.negative{color:#e07060;}

/* 帳戶列表 */
.account-list{display:flex;flex-direction:column;gap:7px;margin-bottom:4px;}
.account-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;
  background:rgba(200,150,40,0.03);
  border:1px solid rgba(200,150,40,0.11);
  border-radius:6px;
}
.account-name{
  font-family:'Noto Sans TC',sans-serif;
  font-size:12px;color:rgba(210,175,90,.85);letter-spacing:1px;
}
.account-val{
  font-family:'Noto Sans TC',sans-serif;
  font-size:13px;font-weight:700;color:#e0c880;letter-spacing:1px;
}
.account-row.total-row{
  border-color:rgba(200,150,40,0.3);
  background:rgba(200,150,40,0.08);
  margin-top:4px;
}
.account-row.total-row .account-name{color:#e8c050;font-weight:700;}
.account-row.total-row .account-val{color:#f0dc90;font-size:15px;}

/* 儲蓄率 badge */
.saving-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Noto Sans TC',sans-serif;
  font-size:11px;color:rgba(180,140,60,.7);letter-spacing:2px;
  margin-top:14px;
}
.saving-val{color:#f0dc90;font-weight:700;font-size:13px;}

/* 錯誤狀態 */
.lord-error{
  padding:24px 0;text-align:center;
  font-family:'Noto Sans TC',sans-serif;font-size:12px;
  color:rgba(200,100,80,.7);letter-spacing:2px;line-height:2;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>

<div class="wrap">
  <div class="header">
    <!-- 主公圖：緊靠標題左側 -->
    <img class="hdr-char" src="lord-rider.png" alt="主公" id="lordBtn">

    <div class="header-inner">
      <div class="hdr-title">⚔️ 帝國指揮所</div>
      <div class="hdr-sub">Three Pillars of Power</div>
      <div class="hdr-date">
        <span class="hdr-date-day" id="dateDay"></span>
        <span class="hdr-date-ym" id="dateYM"></span>
        <span class="hdr-date-week" id="dateWeek"></span>
      </div>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="finance-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>倉庫</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="domestic-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>交易</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="military-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>投資</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="market-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>市場儀表板</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-note">運籌帷幄之中 · 決勝千里之外</div>
</div>

<!-- ══ 主公面板 Modal ══ -->
<div class="lord-modal-overlay" id="lordModal">
  <div class="lord-modal">
    <div class="mc tl"></div><div class="mc tr"></div>
    <div class="mc bl"></div><div class="mc br"></div>
    <button class="lord-modal-close" id="lordModalClose">✕</button>

    <div class="lord-modal-hdr">
      <img class="lord-modal-avatar" src="lord-rider.png" alt="主公">
      <div class="lord-modal-title-wrap">
        <div class="lord-modal-name">財　政　總　覽</div>
        <div class="lord-modal-sub">Financial Command · Imperial Treasury</div>
      </div>
    </div>

    <!-- 動態財政內容 -->
    <div id="lordFinContent">
      <div class="lord-loading">
        <div class="lord-spinner"></div>
        <span>調閱帝國帳冊中…</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── 設定 ──────────────────────────────────────────
const WEBAPP_ID = 'AKfycbz1Ndp8oT7penjejzs4LZxBnc1pmnmr_uoV4sGZJLmlRVEiK3vpcPtOtkvQASFiS4Hb';
const WEBAPP_URL = `https://script.google.com/macros/s/${WEBAPP_ID}/exec`;

// ── 動態日期 ──────────────────────────────────────
(function(){
  const now = new Date();
  const weeks = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDay').textContent = now.getDate();
  document.getElementById('dateYM').textContent =
    `${now.getFullYear()} / ${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('dateWeek').textContent = `· 星期${weeks[now.getDay()]}`;
})();

// ── 數字格式 ──────────────────────────────────────
function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('zh-TW');
}

// ── 財政資料渲染 ──────────────────────────────────
function renderFinance(accounts, monthly) {
  const container = document.getElementById('lordFinContent');

  // 過濾掉「總資產」，最後單獨顯示
  const accs = accounts.filter(a => !a.name.includes('總資產'));
  const total = accounts.find(a => a.name.includes('總資產'));

  // 本月 YM
  const now = new Date();
  const ym = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;
  const inc = monthly.income || 0;
  const exp = monthly.expense || 0;
  const net = monthly.net || 0;
  const netClass = net >= 0 ? 'positive' : 'negative';

  let html = `
    <div class="fin-section-title">本月收支 · ${ym}</div>
    <div class="fin-summary">
      <div class="fin-card">
        <div class="fin-card-label">本月收入</div>
        <div class="fin-card-value income">$${fmt(inc)}</div>
      </div>
      <div class="fin-card">
        <div class="fin-card-label">本月支出</div>
        <div class="fin-card-value expense">$${fmt(exp)}</div>
      </div>
      <div class="fin-card">
        <div class="fin-card-label">結餘</div>
        <div class="fin-card-value net ${netClass}">${net>=0?'+':''}$${fmt(net)}</div>
      </div>
    </div>

    <div class="lord-divider"></div>
    <div class="fin-section-title">各帳戶餘額</div>
    <div class="account-list">
  `;

  accs.forEach(a => {
    html += `
      <div class="account-row">
        <span class="account-name">${a.name}</span>
        <span class="account-val">$${fmt(a.value)}</span>
      </div>
    `;
  });

  if (total) {
    html += `
      <div class="account-row total-row">
        <span class="account-name">⚖️ ${total.name}</span>
        <span class="account-val">$${fmt(total.value)}</span>
      </div>
    `;
  }

  html += `</div>`;

  if (monthly.savingRate) {
    html += `
      <div class="saving-badge">
        儲蓄率&ensp;<span class="saving-val">${monthly.savingRate}</span>
      </div>
    `;
  }

  container.innerHTML = html;
}

// ── 從 WebApp 拉取資料 ────────────────────────────
async function loadFinanceData() {
  const container = document.getElementById('lordFinContent');
  try {
    const now = new Date();
    const ym = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;

    const [accRes, monthRes] = await Promise.all([
      fetch(`${WEBAPP_URL}?action=accounts`),
      fetch(`${WEBAPP_URL}?action=monthly&ym=${ym}`)
    ]);

    const accData   = await accRes.json();
    const monthData = await monthRes.json();

    if (!accData.ok || !monthData.ok) {
      throw new Error(accData.error || monthData.error || '資料讀取失敗');
    }

    renderFinance(accData.data, monthData.data);
  } catch(e) {
    container.innerHTML = `
      <div class="lord-error">
        ⚠️ 無法連線至帝國帳冊<br>
        <small style="opacity:.6;font-size:10px;letter-spacing:1px">${e.message}</small>
      </div>
    `;
  }
}

// ── 主公面板開關 ──────────────────────────────────
const overlay = document.getElementById('lordModal');
let loaded = false;

document.getElementById('lordBtn').addEventListener('click', () => {
  overlay.classList.add('open');
  if (!loaded) {
    loaded = true;
    loadFinanceData();
  }
});
document.getElementById('lordModalClose').addEventListener('click', () => {
  overlay.classList.remove('open');
});
overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') overlay.classList.remove('open');
});
</script>

</body>
</html>
