/* 漸層遮罩：上方保留清晰，下方漸暗以托住卡片 */
.bg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(180deg,
      rgba(14,12,8,0) 0%,
      rgba(14,12,8,0.15) 35%,
      rgba(14,12,8,0.55) 60%,
      rgba(14,12,8,0.85) 80%,
      rgba(14,12,8,0.95) 100%
    ),
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 100%);
}

/* ── 顆粒紋理疊加 ── */
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
}

/* ── 主容器 ── */
.wrap{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 60px;
}

/* ── Header ── */
.header{
  width:100%;max-width:1100px;
  padding:32px 0 28px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* 橫線裝飾 */
.header::before,.header::after{
  content:'';position:absolute;top:50%;
  height:1px;width:18%;
  background:linear-gradient(90deg, transparent, rgba(200,150,40,0.4), transparent);
}
.header::before{left:0}
.header::after{right:0}

.header-inner{
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}

.hdr-title{
  font-size:28px;font-weight:900;letter-spacing:10px;
  color:#f5e8c0;
  text-shadow:
    0 0 8px rgba(0,0,0,.95),
    0 2px 6px rgba(0,0,0,.9),
    0 0 28px rgba(200,150,40,.5),
    0 0 56px rgba(200,150,40,.2);
}

.hdr-sub{
  font-family:'Cinzel Decorative',serif;
  font-size:9px;letter-spacing:7px;color:#c8a060;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
  text-transform:uppercase;
}

.hdr-date{
  display:flex;align-items:baseline;gap:10px;margin-top:2px;
}
.hdr-date-day{
  font-family:'Cinzel Decorative',serif;
  font-size:32px;font-weight:700;color:#f0dfa0;
  text-shadow:0 0 10px rgba(0,0,0,.95),0 2px 5px rgba(0,0,0,.9),0 0 22px rgba(200,150,40,.4);
  line-height:1;
}
.hdr-date-ym{
  font-size:12px;color:#c8b07a;letter-spacing:2px;
  text-shadow:0 1px 5px rgba(0,0,0,.95);
  font-family:'Noto Sans TC',sans-serif;
}
.hdr-date-week{
  font-size:11px;color:#a89060;letter-spacing:1px;
  text-shadow:0 1px 5px rgba(0,0,0,.95);
  font-family:'Noto Sans TC',sans-serif;
}

/* ── 卡片區 ── */
.cards{
  display:flex;gap:22px;justify-content:center;flex-wrap:wrap;
  margin-top:12px;width:100%;max-width:1100px;
}

/* ── 單張卡片 ── */
.card{
  width:240px;cursor:pointer;position:relative;
  animation:appear .7s cubic-bezier(.22,1,.36,1) both;
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
}
.card:nth-child(1){animation-delay:.1s}
.card:nth-child(2){animation-delay:.25s}
.card:nth-child(3){animation-delay:.4s}
.card:nth-child(4){animation-delay:.55s}
@keyframes appear{from{opacity:0;transform:translateY(36px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.card:hover{transform:translateY(-12px) scale(1.03);z-index:10}

/* 卡片外框 */
.frame{
  border-radius:8px;overflow:hidden;
  border:1px solid rgba(200,150,40,0.35);
  box-shadow:
    0 0 0 1px rgba(200,150,40,0.12),
    0 8px 32px rgba(0,0,0,0.7),
    0 2px 8px rgba(0,0,0,0.5),
    inset 0 0 20px rgba(200,150,40,0.04);
  background:#0e0c08;
  position:relative;
}

/* 角裝飾 */
.corner{position:absolute;width:14px;height:14px;z-index:5;pointer-events:none}
.corner.tl{top:5px;left:5px;border-top:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.corner.tr{top:5px;right:5px;border-top:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}
.corner.bl{bottom:5px;left:5px;border-bottom:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.corner.br{bottom:5px;right:5px;border-bottom:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}

/* 影片區 */
.card-video-wrap{
  position:relative;overflow:hidden;height:427px;
}
.card-video-wrap video{
  width:100%;height:auto;display:block;
}
/* 底部漸層＋小字 */
.card-label{
  position:absolute;bottom:0;left:0;right:0;z-index:4;
  background:linear-gradient(to top,rgba(8,5,3,.95) 0%,rgba(8,5,3,.5) 50%,transparent 100%);
  padding:18px 12px 12px;text-align:center;pointer-events:none;
}
.card-label span{
  font-family:'Noto Sans TC',sans-serif;
  font-size:11px;color:#c09a50;letter-spacing:3px;
}

/* ── 底部說明文字 ── */
.footer-note{
  margin-top:32px;
  font-family:'Noto Sans TC',sans-serif;
  font-size:11px;color:rgba(180,150,80,0.5);
  letter-spacing:4px;text-align:center;
}
</style>
</head>
