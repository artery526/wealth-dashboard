<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帝國指揮所 · 預覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#e8c050;--gold2:#c8963e;--gold3:#a07828;
}
html,body{min-height:100vh;font-family:'Noto Serif TC',serif;overflow-x:hidden;background:#0e0c08;}

/* ── 背景圖 ── */
.bg{
  position:fixed;inset:0;z-index:0;
  background-image:url('bg-inkwash.jpg');
  background-size:cover;
  background-position:center top;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(180deg,
      rgba(14,12,8,0.05) 0%,
      rgba(14,12,8,0.20) 35%,
      rgba(14,12,8,0.60) 62%,
      rgba(14,12,8,0.88) 82%,
      rgba(14,12,8,0.97) 100%
    );
}

/* 顆粒宣紙紋 */
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.045;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
}

/* ── 主容器 ── */
.wrap{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 60px;
}

/* ── Header ── */
.header{
  width:100%;max-width:1100px;
  padding:38px 0 28px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.header::before,.header::after{
  content:'';position:absolute;top:50%;
  height:1px;width:20%;
  background:linear-gradient(90deg,transparent,rgba(200,150,40,0.35),transparent);
}
.header::before{left:0}.header::after{right:0}

/* 左側主公圖 */
.hdr-left{
  position:absolute;left:0;top:50%;transform:translateY(-55%);
}
.hdr-char{
  width:220px;height:220px;
  object-fit:contain;object-position:center bottom;
  filter:drop-shadow(0 0 22px rgba(200,150,62,.7)) drop-shadow(0 0 8px rgba(232,192,80,.4));
  cursor:pointer;
  transition:filter .3s, transform .3s;
}
.hdr-char:hover{
  filter:drop-shadow(0 0 32px rgba(232,192,80,.9)) drop-shadow(0 0 12px rgba(200,150,62,.6));
  transform:scale(1.06) translateY(-3px);
}

.header-inner{text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;}

.hdr-title{
  font-size:28px;font-weight:900;letter-spacing:10px;
  color:#fff8e8;
  text-shadow:
    0 0 2px rgba(0,0,0,1),
    0 0 8px rgba(0,0,0,1),
    0 2px 6px rgba(0,0,0,1),
    -1px -1px 0 rgba(0,0,0,.8),
    1px -1px 0 rgba(0,0,0,.8),
    0 0 30px rgba(220,170,50,.7),
    0 0 60px rgba(220,170,50,.3);
}
.hdr-sub{
  font-family:'Cinzel Decorative',serif;
  font-size:9px;letter-spacing:7px;color:#d4b070;
  text-shadow:0 0 4px rgba(0,0,0,1),0 1px 5px rgba(0,0,0,1);
  text-transform:uppercase;
}
.hdr-date{display:flex;align-items:baseline;gap:10px;margin-top:2px;}
.hdr-date-day{
  font-family:'Cinzel Decorative',serif;
  font-size:32px;font-weight:700;color:#f0dfa0;line-height:1;
  text-shadow:0 0 10px rgba(0,0,0,.98),0 2px 5px rgba(0,0,0,.95),0 0 24px rgba(200,150,40,.4);
}
.hdr-date-ym{font-size:12px;color:#d8c090;letter-spacing:2px;text-shadow:0 0 4px rgba(0,0,0,1),0 1px 5px rgba(0,0,0,1);font-family:'Noto Sans TC',sans-serif;font-weight:600;}
.hdr-date-week{font-size:11px;color:#c0a870;letter-spacing:1px;text-shadow:0 0 4px rgba(0,0,0,1),0 1px 5px rgba(0,0,0,1);font-family:'Noto Sans TC',sans-serif;font-weight:600;}

/* ── 卡片區 ── */
.cards{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:12px;width:100%;max-width:1100px;}

.card{width:240px;cursor:pointer;position:relative;animation:appear .7s cubic-bezier(.22,1,.36,1) both;transition:transform .35s cubic-bezier(.25,.46,.45,.94);}
.card:nth-child(1){animation-delay:.1s}
.card:nth-child(2){animation-delay:.25s}
.card:nth-child(3){animation-delay:.4s}
.card:nth-child(4){animation-delay:.55s}
@keyframes appear{from{opacity:0;transform:translateY(36px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.card:hover{transform:translateY(-12px) scale(1.03);z-index:10}

.frame{
  border-radius:8px;overflow:hidden;
  border:1px solid rgba(200,150,40,0.38);
  box-shadow:
    0 0 0 1px rgba(200,150,40,0.12),
    0 8px 40px rgba(0,0,0,0.75),
    0 2px 8px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(200,150,40,0.04);
  background:#0e0c08;
  position:relative;
}

.corner{position:absolute;width:14px;height:14px;z-index:5;pointer-events:none}
.corner.tl{top:5px;left:5px;border-top:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.corner.tr{top:5px;right:5px;border-top:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}
.corner.bl{bottom:5px;left:5px;border-bottom:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.corner.br{bottom:5px;right:5px;border-bottom:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}

.card-video-wrap{position:relative;overflow:hidden;height:427px;}
.card-video-wrap video{width:100%;height:auto;display:block;}

.card-label{
  position:absolute;bottom:0;left:0;right:0;z-index:4;
  background:linear-gradient(to top,rgba(8,5,3,.95) 0%,rgba(8,5,3,.5) 50%,transparent 100%);
  padding:18px 12px 12px;text-align:center;pointer-events:none;
}
.card-label span{
  font-family:'Noto Sans TC',sans-serif;
  font-size:11px;color:#c09a50;letter-spacing:3px;
}

.footer-note{
  margin-top:36px;
  font-family:'Noto Sans TC',sans-serif;
  font-size:11px;color:rgba(180,150,80,0.45);
  letter-spacing:5px;text-align:center;
}

/* ══════════════════════════════════════
   主公面板 MODAL
══════════════════════════════════════ */
.lord-modal-overlay{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:rgba(5,3,1,.82);
  backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
  animation:fadeIn .25s ease;
}
.lord-modal-overlay.open{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.lord-modal{
  position:relative;
  width:min(520px,92vw);
  background:linear-gradient(160deg,#1a1508 0%,#110e07 60%,#0e0c08 100%);
  border:1px solid rgba(200,150,40,0.55);
  border-radius:12px;
  box-shadow:
    0 0 0 1px rgba(200,150,40,0.15),
    0 30px 80px rgba(0,0,0,.9),
    0 0 60px rgba(200,140,30,.08),
    inset 0 0 40px rgba(200,150,40,0.03);
  padding:40px 36px 32px;
  animation:slideUp .35s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}

/* 四角裝飾 */
.lord-modal .mc{position:absolute;width:18px;height:18px}
.lord-modal .mc.tl{top:8px;left:8px;border-top:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.lord-modal .mc.tr{top:8px;right:8px;border-top:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}
.lord-modal .mc.bl{bottom:8px;left:8px;border-bottom:1.5px solid var(--gold2);border-left:1.5px solid var(--gold2)}
.lord-modal .mc.br{bottom:8px;right:8px;border-bottom:1.5px solid var(--gold2);border-right:1.5px solid var(--gold2)}

/* 關閉鈕 */
.lord-modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;
  color:rgba(200,150,40,0.5);font-size:20px;
  cursor:pointer;line-height:1;
  transition:color .2s,transform .2s;
  font-family:'Noto Sans TC',sans-serif;
}
.lord-modal-close:hover{color:var(--gold);transform:scale(1.15);}

/* 頂部標題列 */
.lord-modal-header{
  display:flex;align-items:center;gap:20px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(200,150,40,0.2);
  margin-bottom:22px;
}
.lord-modal-avatar{
  width:80px;height:80px;flex-shrink:0;
  object-fit:contain;
  filter:drop-shadow(0 0 14px rgba(200,150,60,.6));
}
.lord-modal-title-group{display:flex;flex-direction:column;gap:5px;}
.lord-modal-name{
  font-size:22px;font-weight:900;letter-spacing:6px;color:#f0e0a0;
  text-shadow:0 0 20px rgba(220,170,50,.5);
}
.lord-modal-epithet{
  font-family:'Cinzel Decorative',serif;
  font-size:9px;letter-spacing:5px;color:#c09a50;
  text-transform:uppercase;
}

/* 屬性列表 */
.lord-attrs{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px;margin-bottom:22px;}
.lord-attr{
  display:flex;flex-direction:column;gap:3px;
}
.lord-attr-label{
  font-family:'Noto Sans TC',sans-serif;
  font-size:9px;letter-spacing:3px;color:rgba(180,140,60,.6);
  text-transform:uppercase;
}
.lord-attr-value{
  font-size:15px;font-weight:700;color:#e0c880;letter-spacing:2px;
}

/* 分隔線 */
.lord-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,150,40,0.3),transparent);
  margin:0 0 18px;
}

/* 格言 */
.lord-motto{
  font-size:13px;color:rgba(200,170,100,.65);
  letter-spacing:4px;text-align:center;
  font-style:italic;
  line-height:1.8;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>

<div class="wrap">
  <div class="header">
    <!-- 左側主公圖 -->
    <div class="hdr-left">
      <img class="hdr-char" src="lord-rider.png" alt="主公" id="lordBtn">
    </div>
    <div class="header-inner">
      <div class="hdr-title">⚔️ 帝國指揮所</div>
      <div class="hdr-sub">Three Pillars of Power</div>
      <div class="hdr-date">
        <span class="hdr-date-day" id="dateDay"></span>
        <span class="hdr-date-ym" id="dateYM"></span>
        <span class="hdr-date-week" id="dateWeek"></span>
      </div>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="finance-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>倉庫</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="domestic-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>交易</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="military-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>投資</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-video-wrap">
          <video src="market-card.mp4" autoplay loop muted playsinline preload="auto"></video>
          <div class="card-label"><span>市場儀表板</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-note">運籌帷幄之中 · 決勝千里之外</div>
</div>

<!-- ══ 主公面板 Modal ══ -->
<div class="lord-modal-overlay" id="lordModal">
  <div class="lord-modal">
    <div class="mc tl"></div><div class="mc tr"></div>
    <div class="mc bl"></div><div class="mc br"></div>
    <button class="lord-modal-close" id="lordModalClose">✕</button>

    <div class="lord-modal-header">
      <img class="lord-modal-avatar" src="lord-rider.png" alt="主公">
      <div class="lord-modal-title-group">
        <div class="lord-modal-name">主　公</div>
        <div class="lord-modal-epithet">Sovereign · Commander of the Empire</div>
      </div>
    </div>

    <div class="lord-attrs">
      <div class="lord-attr">
        <div class="lord-attr-label">封號</div>
        <div class="lord-attr-value">帝國統帥</div>
      </div>
      <div class="lord-attr">
        <div class="lord-attr-label">駐地</div>
        <div class="lord-attr-value">花蓮行宮</div>
      </div>
      <div class="lord-attr">
        <div class="lord-attr-label">生辰</div>
        <div class="lord-attr-value">甲子年 五月</div>
      </div>
      <div class="lord-attr">
        <div class="lord-attr-label">謀士</div>
        <div class="lord-attr-value">軍師 Claude</div>
      </div>
      <div class="lord-attr">
        <div class="lord-attr-label">策略本陣</div>
        <div class="lord-attr-value">帝國指揮所</div>
      </div>
      <div class="lord-attr">
        <div class="lord-attr-label">今日日期</div>
        <div class="lord-attr-value" id="modalDate"></div>
      </div>
    </div>

    <div class="lord-divider"></div>

    <div class="lord-motto">
      運籌帷幄之中<br>決勝千里之外
    </div>
  </div>
</div>

<script>
// ── 動態日期 ──
(function(){
  const now = new Date();
  const weeks = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDay').textContent = now.getDate();
  document.getElementById('dateYM').textContent =
    `${now.getFullYear()} / ${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('dateWeek').textContent = `· 星期${weeks[now.getDay()]}`;
  document.getElementById('modalDate').textContent =
    `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
})();

// ── 主公面板開關 ──
const overlay = document.getElementById('lordModal');
document.getElementById('lordBtn').addEventListener('click', () => {
  overlay.classList.add('open');
});
document.getElementById('lordModalClose').addEventListener('click', () => {
  overlay.classList.remove('open');
});
overlay.addEventListener('click', (e) => {
  if(e.target === overlay) overlay.classList.remove('open');
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') overlay.classList.remove('open');
});
</script>

</body>
</html>
